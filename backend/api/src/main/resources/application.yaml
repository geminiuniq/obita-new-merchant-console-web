spring:
  application:
    name: obita-api
  threads:
    virtual:
      enabled: true                               # Java 21 virtual threads for IO-bound paths

  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/obita}
    username: ${SPRING_DATASOURCE_USERNAME:obita}
    password: ${SPRING_DATASOURCE_PASSWORD:obita_dev_pwd}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      connection-timeout: 5000
      validation-timeout: 2000
      keepalive-time: 60000

  data:
    redis:
      host:     ${SPRING_DATA_REDIS_HOST:localhost}
      port:     ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:obita_dev_pwd}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 5
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.obita.infrastructure.persistence
  type-handlers-package: com.obita.infrastructure.config

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:obita-mvp-producer}
    send-message-timeout: 3000

server:
  port: 8080
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

obita:
  auth:
    jwt-secret:    ${OBITA_AUTH_JWT_SECRET:change_me_to_a_64_char_random_string_______________________________}
    access-ttl:    ${OBITA_AUTH_ACCESS_TTL:PT15M}
    refresh-ttl:   ${OBITA_AUTH_REFRESH_TTL:P14D}
    pepper:        ${OBITA_AUTH_PASSWORD_PEPPER:dev_pepper_change_me}

  custody:
    provider: ${OBITA_CUSTODY_PROVIDER:mock}
  ramp:
    provider: ${OBITA_FIAT_RAMP_PROVIDER:mock}
  bridge:
    provider: ${OBITA_BRIDGE_PROVIDER:mock}

  chains:
    ETH:
      family: EVM
      network: testnet
      rpc-url: ${OBITA_RPC_ETH:https://eth-sepolia.g.alchemy.com/v2/demo}
      confirmations: 12
    BSC:
      family: EVM
      network: testnet
      rpc-url: ${OBITA_RPC_BSC:https://data-seed-prebsc-1-s1.binance.org:8545}
      confirmations: 15
    POLYGON:
      family: EVM
      network: testnet
      rpc-url: ${OBITA_RPC_POLYGON:https://rpc-amoy.polygon.technology}
      confirmations: 64
    TRON:
      family: TRON
      network: testnet
      rpc-url: ${OBITA_RPC_TRON:https://api.shasta.trongrid.io}
      confirmations: 19
