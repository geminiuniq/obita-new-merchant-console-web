# Local infrastructure for the Obita backend MVP.
#   docker compose up -d
# Starts: Postgres 16, Redis 7, RocketMQ 5 (namesrv + broker + dashboard), Adminer.
# All services are bound to localhost only — never expose these in production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: obita-postgres
    environment:
      POSTGRES_USER: obita
      POSTGRES_PASSWORD: obita_dev_pwd
      POSTGRES_DB: obita
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=200
      - -c
      - log_statement=mod
      - -c
      - log_min_duration_statement=200
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - obita-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obita -d obita"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: obita-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "obita_dev_pwd"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - obita-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "obita_dev_pwd", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.0
    container_name: obita-rmq-namesrv
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m -Xmn128m"
    ports:
      - "127.0.0.1:9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.0
    container_name: obita-rmq-broker
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy -c /home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m -Xmn256m"
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
    ports:
      - "127.0.0.1:10909:10909"
      - "127.0.0.1:10911:10911"
      - "127.0.0.1:10912:10912"
      - "127.0.0.1:8081:8081"
    volumes:
      - ./infra/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.0/conf/broker.conf:ro

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: obita-rmq-dashboard
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "127.0.0.1:18080:8080"

  adminer:
    image: adminer:4.8.1
    container_name: obita-adminer
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "127.0.0.1:18081:8080"

volumes:
  obita-pg-data:
  obita-redis-data:
